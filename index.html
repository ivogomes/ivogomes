<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>

<script src="src/data.js?v=5"></script>
<script type="text/babel" data-presets="react" src="src/ProjectTile.jsx?v=5"></script>
<script type="text/babel" data-presets="react" src="src/ProjectPage.jsx?v=5"></script>
<script type="text/babel" data-presets="react" src="src/HomePage.jsx?v=5"></script>

<script type="text/babel" data-presets="react">
  const { useState, useEffect } = React;

  function parseHash() {
    const h = window.location.hash || '';
    const m = h.match(/^#\/project\/([a-z0-9-]+)/i);
    return m ? m[1] : null;
  }

  function App() {
    const [projectId, setProjectId] = useState(() => parseHash());

    useEffect(() => {
      const onHash = () => setProjectId(parseHash());
      window.addEventListener('hashchange', onHash);
      return () => window.removeEventListener('hashchange', onHash);
    }, []);

    const openProject = (id) => {
      window.location.hash = '#/project/' + id;
      setProjectId(id);
      window.scrollTo({top: 0, behavior: 'instant'});
    };
    const backToHome = () => {
      window.location.hash = '';
      setProjectId(null);
      window.scrollTo({top: 0, behavior: 'instant'});
    };

    if (projectId) {
      const project = window.IVO_DATA.projects.find(p => p.id === projectId);
      if (project) {
        return <window.ProjectPage
          project={project}
          direction="editorial"
          allProjects={window.IVO_DATA.projects}
          onBack={backToHome}
          onNavigate={openProject}
        />;
      }
    }

    return <window.EditorialDirection data={window.IVO_DATA} onOpenProject={openProject} />;
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
